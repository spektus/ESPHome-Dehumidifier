esphome:
  name: midea-dehumidifier

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  platform: esphome
  password: !secret ota_update

external_components:
  - source:
      type: local
      path: components
    components: [midea_dehum]
    refresh: 0min

uart:
  id: uart_midea
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 9600

midea_dehum:
  id: midea_dehum_comp
  uart_id: uart_midea
  status_poll_interval: 1000

binary_sensor:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    bucket_full:
      name: "Bucket Full"
    clean_filter:
      name: "Clean Filter Request"
    defrost:
      name: "Defrosting"

button:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    filter_cleaned:
      name: "Reset Filter Cleaning"

sensor:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    current_humidity:
      name: "Current Humidity"
    current_temperature:
      name: "Current Temperature"
    error:
      name: "Error Code"
    tank_level:
      name: "Tank water level"
    pm25:
      name: "pm2.5"

switch:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    power:
      name: "Power"
    swing:
      name: "Swing"
    horizontal_swing:
      name: "Horizontal Swing"
    ionizer:
      name: "Ionizer"
    pump:
      name: 'Pump'
    sleep:
      name: "Sleep Mode"
    beep:
      name: "Beep on Command"

number:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    timer:
      name: "Internal Device Timer"
    humidity_setpoint:
      name: "Humidity Setpoint"

text_sensor:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    capabilities:
      name: "Device Capabilities"

select:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    mode:
      name: "Mode"
    fan_speed:
      name: "Fan Speed"
